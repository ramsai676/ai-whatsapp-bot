# One-click deploy to Render (https://render.com) - free tier.
# In Render: New + → Blueprint → connect this repo. Render reads this file.
# The built-in simulator works immediately. The WhatsApp/AI vars are optional
# and only needed to connect a real WhatsApp number.
services:
  - type: web
    name: ai-whatsapp-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
